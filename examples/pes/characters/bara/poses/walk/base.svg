<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="240" height="180">
  <g stroke="#21304a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- tail: brown, raised at the back-left -->
    <path d="M52 100 Q30 90 38 62" fill="none" stroke="#c47b3e" stroke-width="14"/>
    <!-- legs mid-stride, white (drawn before the body so the body overlaps them) -->
    <path d="M68 130 L58 170" fill="none" stroke="#f7f7f4" stroke-width="13"/>
    <path d="M92 136 L102 170" fill="none" stroke="#f7f7f4" stroke-width="13"/>
    <path d="M118 132 L108 170" fill="none" stroke="#f7f7f4" stroke-width="13"/>
    <path d="M142 128 L152 168" fill="none" stroke="#f7f7f4" stroke-width="13"/>
    <ellipse cx="58" cy="171" rx="9" ry="5.5" fill="#f7f7f4"/>
    <ellipse cx="102" cy="171" rx="9" ry="5.5" fill="#f7f7f4"/>
    <ellipse cx="108" cy="171" rx="9" ry="5.5" fill="#f7f7f4"/>
    <ellipse cx="152" cy="169" rx="9" ry="5.5" fill="#f7f7f4"/>
    <!-- body: white oval, leaning toward the front -->
    <ellipse cx="96" cy="108" rx="60" ry="33" fill="#f7f7f4"/>
    <!-- brown saddle on the back -->
    <path d="M66 94 Q96 78 132 94 Q128 114 96 114 Q68 112 66 94 Z"
          fill="#c47b3e" stroke="none"/>
    <!-- head: white, front-facing, carried forward — centre [132, 64] -->
    <circle cx="132" cy="64" r="40" fill="#f7f7f4"/>
    <!-- floppy ears, brown -->
    <path d="M98 42 Q74 48 80 92 Q102 90 110 58 Z" fill="#c47b3e" stroke="#21304a"/>
    <path d="M166 42 Q190 48 184 92 Q164 90 156 58 Z" fill="#c47b3e" stroke="#21304a"/>
    <!-- brown patch over the dog's left eye (viewer's right) + crown -->
    <path d="M132 28 Q162 28 164 54 Q162 74 144 76 Q132 70 132 54 Z"
          fill="#c47b3e" stroke="none"/>
  </g>
</svg>
