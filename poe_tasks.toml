verbosity = -1

[tasks.fix]
sequence = [
    { cmd = "ruff format --quiet ." },
    { cmd = "ruff check --fix --quiet ." },
]
help = "Auto-fix: format and lint"

[tasks.lint]
cmd = "ruff check ."
help = "Run linter (no fix)"

[tasks.typecheck]
cmd = "ty check"
help = "Run type checker"

[tasks.test]
cmd = "pytest -o addopts= -x -qq --tb=line --no-header"
help = "Fail-fast tests: no coverage, minimal output"

[tasks.cov]
cmd = "pytest"
help = "Full test run with coverage report"

[tasks.dead-code]
cmd = "vulture comicforge"
help = "Dead code detection"

[tasks.unused-deps]
cmd = "deptry ."
help = "Unused dependency check"

[tasks.clones]
cmd = "biston scan ."
help = "Structural clone detection (advisory)"

[tasks.vulns]
shell = "uvx pysentry-rs --compact . || true"
interpreter = "bash"
help = "Dependency vulnerability scan"

[tasks._check-parallel]
shell = """
  ruff check . &
  ty check &
  vulture comicforge &
  deptry . &
  biston scan . &
  (uvx pysentry-rs --compact . || true) &
  wait
"""
interpreter = "bash"

[tasks.check]
sequence = [
    { ref = "_check-parallel" },
    { ref = "test" },
]
help = "Run all checks (parallel static analysis, then fail-fast tests)"
