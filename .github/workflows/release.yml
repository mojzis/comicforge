name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Build sdist + wheel
        run: uv build

      - name: Check version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(uv version --short)"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag != pyproject version $pkg"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    # Trusted publishing (OIDC) — no API token. Configure the publisher at
    # https://pypi.org/manage/account/publishing/ for this repo + workflow.
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
