name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # cairosvg dlopens libcairo at runtime — not a pip dependency.
      - name: Install cairo
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      # Plain sync mirrors the canonical `poe check` env. The `inspire` extra
      # (replicate) is optional and changes ty's inference, so it's exercised in
      # the separate `extras` job below, not here.
      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run poe lint

      - name: Typecheck
        run: uv run poe typecheck

      - name: Dead code
        run: uv run poe dead-code

      - name: Unused deps
        run: uv run poe unused-deps

      - name: Tests (with coverage)
        run: uv run poe cov

      # Advisory — never gate the build.
      - name: Structural clones
        if: always()
        continue-on-error: true
        run: uv run poe clones

      - name: Dependency vulnerabilities
        if: always()
        continue-on-error: true
        run: uv run poe vulns

  # The `inspire` optional deps (replicate, python-dotenv) aren't unit-tested —
  # every inspire test is dry-run/pure; the only replicate-touching code path is
  # a thin API wrapper. This job verifies the extra resolves and imports cleanly
  # with everything installed, and reruns the suite in that environment.
  extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install cairo
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync with all extras
        run: uv sync --all-extras

      - name: Import smoke test
        run: uv run python -c "import replicate, dotenv; import comicforge.inspire"

      - name: Tests
        run: uv run poe test
