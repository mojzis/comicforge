<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="240" height="180">
  <g stroke="#21304a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- tail -->
    <path d="M42 104 Q14 96 24 66" fill="none" stroke="#f7f7f4" stroke-width="16"/>
    <!-- legs -->
    <path d="M78 134 L74 166" fill="none" stroke="#f7f7f4" stroke-width="13"/>
    <path d="M106 138 L104 168" fill="none" stroke="#f7f7f4" stroke-width="13"/>
    <path d="M150 138 L150 168" fill="none" stroke="#f7f7f4" stroke-width="13"/>
    <path d="M176 134 L180 166" fill="none" stroke="#f7f7f4" stroke-width="13"/>
    <!-- body -->
    <ellipse cx="112" cy="104" rx="76" ry="38" fill="#f7f7f4"/>
    <!-- head -->
    <circle cx="192" cy="92" r="33" fill="#f7f7f4"/>
    <!-- snout -->
    <path d="M214 90 Q236 95 231 108 Q223 117 208 112 Z" fill="#f7f7f4"/>
    <!-- ears -->
    <path d="M168 70 Q170 44 186 46 Q188 64 180 78 Z" fill="#23262e" stroke="#21304a"/>
    <path d="M198 66 Q210 46 222 54 Q220 72 208 80 Z" fill="#23262e" stroke="#21304a"/>
    <!-- black saddle: upper back only, leaves white belly + legs -->
    <path d="M60 104 Q70 74 116 70 Q164 74 174 104 Q150 110 112 110 Q74 110 60 104 Z"
          fill="#23262e" stroke="none"/>
    <!-- black head patch (leaves white blaze + muzzle) -->
    <path d="M170 92 Q168 58 190 58 Q206 60 206 80 Q196 76 186 80 Q176 82 170 92 Z"
          fill="#23262e" stroke="none"/>
    <!-- collar -->
    <path d="M166 104 Q184 118 204 104" fill="none" stroke="#e0a33a" stroke-width="8"/>
    <circle cx="186" cy="116" r="4" fill="#e0a33a" stroke="#21304a" stroke-width="2"/>
  </g>
</svg>
